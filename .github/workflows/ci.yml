name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

permissions: {}

jobs:
  detect-ci-trigger:
    name: detect ci trigger
    runs-on: ubuntu-latest
    if: |
      github.repository_owner == 'xarray-contrib'
      && (github.event_name == 'pull_request' || github.event_name == 'push')
    outputs:
      triggered: ${{ steps.detect-trigger.outputs.trigger-found }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: xarray-contrib/ci-trigger@10cd2bfec3484946a4058a421ddf9cfad101e715 # v1.2.1
        id: detect-trigger
        with:
          keyword: "[skip-ci]"

  tests:
    name: ${{ matrix.os }} ${{ matrix.env }}
    runs-on: ${{ matrix.os }}
    needs: detect-ci-trigger
    if: needs.detect-ci-trigger.outputs.triggered == 'false'
    defaults:
      run:
        shell: bash -l {0}

    strategy:
      fail-fast: false

      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        env: ["ci-py311", "ci-py312", "ci-py313"]

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags
          persist-credentials: false

      - name: setup environment
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          environments: "${{ matrix.env }}"

      - name: investigate env variables
        env:
          ENV: ${{ matrix.env }}
          RUNNER_OS: ${{ matrix.os }}
        run: |
          echo PYTHON_VERSION=$(pixi run -e $ENV python -c 'import sys; print(".".join(map(str, sys.version_info[:2])))') >> $GITHUB_ENV
          echo RUNNER_OS=$RUNNER_OS >> $GITHUB_ENV

      - name: Import xdggs
        env:
          ENV: ${{ matrix.env }}
        run: |
          pixi run -e $ENV python -c "import xdggs"

      - name: run tests
        if: success()
        id: status
        env:
          ENV: ${{ matrix.env }}
        run: |
          pixi run -e $ENV tests
